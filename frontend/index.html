<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>订单风控系统</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      padding: 28px;
      color: #06152b;
    }

    h1 {
      margin-bottom: 28px;
      font-size: 32px;
    }

    .status {
      position: fixed;
      top: 40px;
      right: 40px;
      color: #2d6cdf;
      font-size: 14px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      padding: 18px;
      border-radius: 10px;
      min-width: 125px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }

    .card .label {
      font-size: 14px;
      color: #4d607a;
      margin-bottom: 12px;
    }

    .card .num {
      font-size: 28px;
      font-weight: bold;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0 20px 0;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 15px;
    }

    input[type="datetime-local"] {
      height: 34px;
      padding: 4px 8px;
    }

    button {
      padding: 9px 14px;
      cursor: pointer;
      border: 0;
      border-radius: 6px;
      background: #2d6cdf;
      color: #fff;
      font-weight: bold;
    }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .chart-card {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      min-height: 260px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }

    .chart-card h3 {
      margin: 0 0 12px 0;
    }

    table {
      width: 100%;
      background: #fff;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #eee;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #f3f3f3;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .charts {
        grid-template-columns: 1fr;
      }

      .status {
        position: static;
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>

<div class="status" id="status">准备加载...</div>

<h1>📦 订单风控 Dashboard</h1>

<div class="cards">
  <div class="card">
    <div class="label">Total</div>
    <div class="num" id="total">0</div>
  </div>

  <div class="card">
    <div class="label">EU</div>
    <div class="num" id="eu">0</div>
  </div>

  <div class="card">
    <div class="label">US</div>
    <div class="num" id="us">0</div>
  </div>

  <div class="card">
    <div class="label">CA</div>
    <div class="num" id="ca">0</div>
  </div>

  <div class="card">
    <div class="label">OTHER</div>
    <div class="num" id="other">0</div>
  </div>
</div>

<div class="cards">
  <div class="card">
    <div class="label">即将处理超时</div>
    <div class="num" id="pending-process-risk">0</div>
  </div>

  <div class="card">
    <div class="label">即将发货超时</div>
    <div class="num" id="pending-ship-risk">0</div>
  </div>

  <div class="card">
    <div class="label">即将预约取件超时</div>
    <div class="num" id="pickup-appointment-risk">0</div>
  </div>

  <div class="card">
    <div class="label">即将揽收超时</div>
    <div class="num" id="pickup-risk">0</div>
  </div>
</div>

<div class="toolbar">
  <label>
    开始时间：
    <input type="datetime-local" id="start-time">
  </label>

  <label>
    结束时间：
    <input type="datetime-local" id="end-time">
  </label>

  <button id="refresh-btn">刷新数据</button>
  <button id="download-btn">下载运营订单</button>
</div>

<div class="charts">
  <div class="chart-card">
    <h3>超时风险趋势</h3>
    <div class="chart-wrap">
      <canvas id="risk-chart"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h3>区域订单分布</h3>
    <div class="chart-wrap">
      <canvas id="region-chart"></canvas>
    </div>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>订单号</th>
      <th>店铺</th>
      <th>区域</th>
      <th>已创建小时数</th>
      <th>物流号</th>
    </tr>
  </thead>
  <tbody id="orders-body"></tbody>
</table>

<script src="./app.js"></script>

</body>
</html>

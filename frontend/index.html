<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>订单风控系统</title>
  <style>
    body { font-family: Arial; background:#f5f6f8; padding:20px; }
    h1 { margin-bottom:20px; }

    .row { display:flex; gap:10px; margin-bottom:20px; }
    .card { background:#fff; padding:15px; border-radius:10px; min-width:120px; }

    button {
      padding:8px 12px;
      cursor:pointer;
      border:0;
      border-radius:6px;
      background:#2d6cdf;
      color:#fff;
    }

    table {
      width:100%;
      background:#fff;
      border-collapse:collapse;
      margin-top:20px;
    }

    th,td {
      border:1px solid #eee;
      padding:8px;
      text-align:center;
    }

    th { background:#f3f3f3; }
  </style>
</head>

<body>

<h1>📦 订单风控 Dashboard</h1>

<div class="row">
  <div class="card">Total<br><h2 id="total">0</h2></div>
  <div class="card">EU<br><h2 id="eu">0</h2></div>
  <div class="card">US<br><h2 id="us">0</h2></div>
  <div class="card">CA<br><h2 id="ca">0</h2></div>
</div>

<button onclick="refreshAll()">刷新数据</button>
<button onclick="downloadOrders()">下载运营订单</button>

<table>
  <thead>
    <tr>
      <th>订单号</th>
      <th>店铺</th>
      <th>区域</th>
      <th>时间</th>
      <th>物流号</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>

// 🔥 Railway 后端地址
const API = "https://shein-monitor-backend-production.up.railway.app";


// =====================
// 📊 Dashboard
// =====================
async function loadDashboard() {
  const res = await fetch(`${API}/dashboard/`);
  const data = await res.json();

  document.getElementById("total").innerText = data.total;
  document.getElementById("eu").innerText = data.eu;
  document.getElementById("us").innerText = data.us;
  document.getElementById("ca").innerText = data.ca;
}


// =====================
// 📦 Orders
// =====================
async function loadOrders() {
  const res = await fetch(`${API}/orders/list/`);
  const data = await res.json();

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.data.forEach(o => {
    tbody.innerHTML += `
      <tr>
        <td>${o.order_no}</td>
        <td>${o.shop_name}</td>
        <td>${o.region}</td>
        <td>${o.created_hours}</td>
        <td>${o.logistics_no || ''}</td>
      </tr>
    `;
  });
}


// =====================
// 📥 下载运营订单
// =====================
function downloadOrders() {
  window.open(`${API}/orders/export/`, "_blank");
}


// =====================
// 🔄 一键刷新
// =====================
function refreshAll() {
  loadDashboard();
  loadOrders();
}


// =====================
// 🚀 自动初始化 + 实时刷新
// =====================
window.onload = () => {
  refreshAll();

  // 每10秒刷新（先稳定，不用太快）
  setInterval(refreshAll, 10000);
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单风控 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body { font-family: Arial, sans-serif; background:#f5f6f8; padding:20px; color:#111827; }
    h1 { margin-bottom:16px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
    .status { font-size:13px; color:#2563eb; }
    .status.error { color:#dc2626; }
    .row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .card { background:#fff; padding:15px; border-radius:12px; min-width:120px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
    .card span { color:#6b7280; font-size:13px; }
    .card h2 { margin:10px 0 0; font-size:26px; }
    button { padding:9px 14px; cursor:pointer; border:0; border-radius:8px; background:#2d6cdf; color:#fff; font-weight:600; }
    button:hover { opacity:.9; }
    .charts { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:16px; margin-bottom:20px; }
    .chart-card { background:#fff; padding:16px; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
    .chart-card h3 { margin:0 0 12px; }
    table { width:100%; background:#fff; border-collapse:collapse; margin-top:20px; border-radius:12px; overflow:hidden; }
    th,td { border:1px solid #eee; padding:9px; text-align:center; font-size:14px; }
    th { background:#f3f4f6; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📦 订单风控 Dashboard</h1>
    <div id="sync-status" class="status">准备加载...</div>
  </div>

  <div class="row">
    <div class="card"><span>Total</span><h2 id="total">0</h2></div>
    <div class="card"><span>EU</span><h2 id="eu">0</h2></div>
    <div class="card"><span>US</span><h2 id="us">0</h2></div>
    <div class="card"><span>CA</span><h2 id="ca">0</h2></div>
    <div class="card"><span>OTHER</span><h2 id="other">0</h2></div>
  </div>

  <div class="row">
<div class="card">即将处理超时<br><h2 id="pending-process-risk">0</h2></div>
<div class="card">即将发货超时<br><h2 id="pending-ship-risk">0</h2></div>
<div class="card">即将预约取件超时<br><h2 id="pickup-appointment-risk">0</h2></div>
<div class="card">即将揽收超时<br><h2 id="pickup-risk">0</h2></div>
  </div>

  <div class="row">
   <div class="toolbar">
  <label>
    开始时间：
    <input type="datetime-local" id="start-time">
  </label>

  <label>
    结束时间：
    <input type="datetime-local" id="end-time">
  </label>

  <button onclick="refreshAll()">刷新数据</button>
  <button onclick="downloadOrders()">下载运营订单</button>
</div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h3>超时风险趋势</h3>
      <canvas id="risk-chart"></canvas>
    </div>
    <div class="chart-card">
      <h3>区域订单分布</h3>
      <canvas id="region-chart"></canvas>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>订单号</th>
        <th>店铺</th>
        <th>区域</th>
        <th>已创建小时数</th>
        <th>物流号</th>
      </tr>
    </thead>
    <tbody id="orders-body"></tbody>
  </table>

  <script src="./app.js"></script>
</body>
</html>
